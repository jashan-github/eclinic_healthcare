services:
  # Webinar Service
  # Note: Uses shared PostgreSQL (eclinic-postgres) and Redis (eclinic-redis) from eclinic-backend
  # Both services use bridge network mode, so they can communicate by container name
  webinar-service:
    build: .
    container_name: webinar-service
    ports:
      - "8002:8002"
    environment:
      - ENVIRONMENT=production
      # Use shared PostgreSQL from eclinic-backend (eclinic-postgres container)
      - DATABASE_URL=postgresql+asyncpg://doadmin:AVNS_DIFzV1UeYUpN6rrOz8T@eclinic-database-do-user-35054447-0.e.db.ondigitalocean.com:25060/defaultdb
      # Use shared Redis from eclinic-backend (eclinic-redis container)
      - REDIS_URL=redis://eclinic-redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AGORA_APP_ID=${AGORA_APP_ID}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE}
      - AGORA_TOKEN_EXPIRY_MINUTES=60
      - AGORA_TOKEN_LOG_FILE=/app/logs/agora_tokens.log
      - ROOT_PATH=/backend/webinar-service
      - CORS_ORIGINS=["*"]
      - CORS_ALLOW_CREDENTIALS=true
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    networks:
      - eclinic-network
    # Note: depends_on won't work across different docker-compose files
    # Ensure eclinic-backend services (postgres, redis) are started first
    restart: unless-stopped

  # Cron: mark past webinars as completed every 5 minutes
  webinar-cron:
    build: .
    container_name: webinar-cron
    user: root
    entrypoint: ["/app/docker/cron-entrypoint.sh"]
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://doadmin:AVNS_DIFzV1UeYUpN6rrOz8T@eclinic-database-do-user-35054447-0.e.db.ondigitalocean.com:25060/defaultdb?sslmode=require
      - REDIS_URL=redis://eclinic-redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
    env_file:
      - .env
    networks:
      - eclinic-network
    restart: unless-stopped

networks:
  eclinic-network:
    external: true
